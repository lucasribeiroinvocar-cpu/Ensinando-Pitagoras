<p>
O Teorema de Pitágoras afirma que em um triângulo retângulo:
</p>

<h2>a² + b² = c²</h2>

<p>
Onde c é a hipotenusa.
</p>

<h3>Exemplo</h3>

<p>
3² + 4² = 5²
</p>

<p>
Portanto, a hipotenusa mede 5.
</p>
